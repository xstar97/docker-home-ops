name: main
reference: main
repository_url: https://github.com/xstar97/docker-home-ops
working_dir: apps/
auto_discover:
  enabled: true
  depth: 1
  delete: true
#force_recreate: false
#prune_images: true
force_image_pull: false
reconciliation:
  enabled: true
  restart_timeout: 10
  restart_limit: 5
  restart_window: 300
  events:
    #- stop
    #- die
    #- destroy
    #- unhealthy
    #- oom
    - kill