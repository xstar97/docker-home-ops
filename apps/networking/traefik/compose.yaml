x-healthcheck: &healthcheck
  test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ping | grep -q '^OK$' || exit 1"]
  interval: 30s
  timeout: 30s
  retries: 3
  start_period: 15s

services:
  traefik:
    image: traefik:3.6.8
    container_name: traefik
    restart: on-failure
    healthcheck: *healthcheck
    command:
      # ACME / Cloudflare
      - --certificatesresolvers.cf.acme.caserver=https://acme-v02.api.letsencrypt.org/directory
      - --certificatesresolvers.cf.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.cf.acme.storage=/certs/acme.json
      # EntryPoints
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls=true
      - --entrypoints.websecure.http.tls.certresolver=cf
      # 🔥 GLOBAL DEFAULT MIDDLEWARE
      - --entrypoints.websecure.http.middlewares=error-pages-middleware@docker
      # Docker Provider
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.defaultRule=Host(`{{ normalize .Name }}.{{ env "BASE_DOMAIN" }}`)
      # Misc
      - --api.insecure=true
      - --ping
      - --log.level=DEBUG
      - --accesslog=true
    networks:
      - network_internal
      - internal
    ports:
      - 80:80
      - 443:443
      - 443:443/udp
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/xstar97/docker/data/traefik/certs:/certs
    labels:
      traefik.enable: "true"
      traefik.http.services.traefik.loadbalancer.server.port: "8080"
    depends_on:
      error-pages:
        condition: service_started
  error-pages:
    container_name: error-pages
    image: ghcr.io/tarampampam/error-pages:3.8.0
    networks:
      - internal
    environment:
      TEMPLATE_NAME: app-down
    labels:
      traefik.enable: "true"
      # Catch-all router (low priority)
      traefik.http.routers.error-pages-router.rule: HostRegexp(`.+`)
      traefik.http.routers.error-pages-router.priority: 10
      traefik.http.routers.error-pages-router.entrypoints: websecure
      # Define middleware
      traefik.http.middlewares.error-pages-middleware.errors.status: 400-599
      traefik.http.middlewares.error-pages-middleware.errors.service: error-pages-service
      traefik.http.middlewares.error-pages-middleware.errors.query: /{status}.html
      # Service
      traefik.http.services.error-pages-service.loadbalancer.server.port: 8080

networks:
  network_internal:
    external: true
  internal:
    driver: bridge
