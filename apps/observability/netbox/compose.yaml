services:

  netbox:
    image: ghcr.io/netbox-community/netbox:v4.5.3
    container_name: netbox
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    networks:
      - network_internal
      - internal
    ports:
      - "8080"
    user: "netbox:root"
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8080/login/"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 90s
    volumes:
      - /home/xstar97/docker/data/netbox/config:/etc/netbox/config:ro
      - /home/xstar97/docker/data/netbox/media:/opt/netbox/netbox/media
      - /home/xstar97/docker/data/netbox/reports:/opt/netbox/netbox/reports
      - /home/xstar97/docker/data/netbox/scripts:/opt/netbox/netbox/scripts
  netbox-worker:
    image: ghcr.io/netbox-community/netbox:v4.5.3
    container_name: netbox-worker
    restart: on-failure
    depends_on:
      netbox:
        condition: service_healthy
    networks:
      - internal
    command:
      - /opt/netbox/venv/bin/python
      - /opt/netbox/netbox/manage.py
      - rqworker
    user: "netbox:root"
    healthcheck:
      test: ["CMD-SHELL","ps aux | grep -v grep | grep -q rqworker"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 20s
    labels:
      traefik.enable: true
      traefik.http.routers.netbox.rule: Host(`netbox.${BASE_DOMAIN}`)
      traefik.http.services.netbox.loadbalancer.server.port: 8080
      traefik.http.routers.netbox.entrypoints: websecure
      traefik.http.routers.netbox.tls: true
      traefik.http.routers.netbox.tls.certResolver: cf
      traefik.http.routers.netbox.middlewares: error-pages-middleware
  postgres:
    image: postgres:18-alpine
    container_name: netbox-postgres
    restart: always
    networks:
      - internal
    environment:
      POSTGRES_DB: netbox
      POSTGRES_USER: netbox
      POSTGRES_PASSWORD: netbox
    volumes:
      - /home/xstar97/docker/data/netbox/db/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -q -t 2 -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 30s
      retries: 5
      start_period: 20s
  redis:
    image: valkey/valkey:9.0-alpine
    container_name: netbox-redis
    restart: always
    networks:
      - internal
    command:
      - sh
      - -c
      - valkey-server --appendonly yes --requirepass netbox
    volumes:
      - /home/xstar97/docker/data/netbox/db/redis:/data
    healthcheck:
      test: ["CMD-SHELL","valkey-cli --pass netbox ping | grep PONG"]
      interval: 1s
      timeout: 3s
      retries: 5
      start_period: 5s
  redis-cache:
    image: valkey/valkey:9.0-alpine
    container_name: netbox-redis-cache
    restart: always
    networks:
      - internal
    command:
      - sh
      - -c
      - valkey-server --requirepass netbox
    volumes:
      - /home/xstar97/docker/data/netbox/db/redis-cache:/data
    healthcheck:
      test: ["CMD-SHELL","valkey-cli --pass netbox ping | grep PONG"]
      interval: 1s
      timeout: 3s
      retries: 5
      start_period: 5s
networks:
  network_internal:
    external: true
  internal:
    driver: bridge
