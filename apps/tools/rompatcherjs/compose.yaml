x-healthcheck: &healthcheck
  test: curl -f http://localhost:3314/health || exit 1
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 15s

services:
  rompatcherjs:
    container_name: rompatcherjs
    image: ghcr.io/xstar97/rompatcherjs:v3.2.1
    networks:
      - network_internal
    ports:
      - 3314
    healthcheck: *healthcheck
    environment:
      SERVER_PORT: 3314
    labels:
      traefik.enable: true
      wud.tag.include: ^\d+\.\d+\.\d+$
networks:
  network_internal:
    external: true
  internal:
    driver: bridge
